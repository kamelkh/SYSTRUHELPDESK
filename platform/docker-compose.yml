version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: systru-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: systru
      MONGO_INITDB_ROOT_PASSWORD: systru_dev_pass
      MONGO_INITDB_DATABASE: systru
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: systru-mongo-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: systru
      ME_CONFIG_MONGODB_ADMINPASSWORD: systru_dev_pass
      ME_CONFIG_MONGODB_URL: mongodb://systru:systru_dev_pass@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongo

volumes:
  mongo_data:
